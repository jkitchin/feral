name: Python wheels

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - "src/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python-wheels.yml"
  pull_request:
    paths:
      - "python/**"
      - "src/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python-wheels.yml"
  release:
    types: [published]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- Sanity build + tests on Linux only, on every push/PR --------
  test:
    name: Test wheel (linux-x86_64, python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Create venv and install maturin + test deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install maturin pytest numpy scipy
          # Expose the venv to subsequent steps. `maturin develop`
          # (and pytest, via the venv's python) need both VIRTUAL_ENV
          # set and the venv's bin/ first on PATH.
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Build extension in editable mode
        working-directory: python
        run: maturin develop --release
      - name: Run pytest
        working-directory: python
        run: python -m pytest tests/ -v

  # --- Build release wheels via maturin-action --------------------
  # We use PyO3/maturin-action instead of cibuildwheel because the
  # Python crate has a `path = ".."` dependency on the parent feral
  # crate. cibuildwheel copies only the package dir (python/) into
  # the manylinux container, so the parent Cargo.toml is missing.
  # maturin-action mounts the whole $GITHUB_WORKSPACE, so the
  # workspace layout works as-is.
  wheels:
    name: Wheel ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            target: x86_64
            manylinux: "2014"
          - os: linux
            runner: ubuntu-24.04-arm
            target: aarch64
            manylinux: "2_28"
          - os: macos
            runner: macos-14
            target: universal2-apple-darwin
          - os: windows
            runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: python
          args: --release --out dist --interpreter '3.10 3.11 3.12 3.13'
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist/*.whl

  # --- Build sdist -----------------------------------------------
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        working-directory: python
        run: |
          python -m pip install maturin
          maturin sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/target/wheels/*.tar.gz

  # --- Smoke test on uv + pip -------------------------------------
  smoke-test:
    name: Smoke test (uv install)
    needs: [wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: wheelhouse
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Smoke test via uv pip
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python \
            --find-links wheelhouse feral-solver numpy
          /tmp/smoke/bin/python python/examples/quickstart.py

  # --- Publish to PyPI on tagged release --------------------------
  publish:
    name: Publish to PyPI
    needs: [wheels, sdist, smoke-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/feral-solver
    permissions:
      id-token: write    # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
