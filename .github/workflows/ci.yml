name: CI
on: [push, pull_request]
# Opt the whole workflow into Node 24 for all JavaScript actions. This
# silences the "Node.js 20 actions are deprecated" warning emitted by
# pre-commit/action@v3.0.1 (whose pinned actions/cache@v4 still ships
# Node 20). Becomes the default on 2026-06-02; this line can be
# removed once pre-commit/action updates its cache pin to v5+.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # pre-commit runs the exact same hooks a developer gets via
      # `pre-commit install`. The hook list lives in
      # .pre-commit-config.yaml — cargo fmt --check and cargo clippy
      # -- -D warnings. Keeping CI and local in lockstep prevents the
      # fmt-drift class of failures (see session 2026-04-12-01).
      - uses: pre-commit/action@v3.0.1
      # The no-unwrap / no-expect rule is enforced by the
      # `#![cfg_attr(not(test), deny(clippy::unwrap_used))]` directive at
      # the top of src/lib.rs, so the clippy step above catches it. No
      # separate grep rule needed.
      - name: test
        run: cargo test
      - name: amd-cleanroom
        # feral-amd is a clean-room implementation of AMD. The external
        # `amd` crate (SuiteSparse port) must never enter the feral
        # workspace dependency graph — it lives ONLY inside the oracle
        # harness under crates/feral-amd/tests/data/amd_oracle/harness/
        # as *.txt files (so Cargo never compiles it).
        run: scripts/check-amd-cleanroom.sh
      - name: commit-body
        # Reject bare summary-only commits on PRs (advisory — does not block CI)
        run: |
          git log --format="%B" -1 | awk 'NR==2{found=1} END{if(!found){print "WARNING: commit has no body";}}'
