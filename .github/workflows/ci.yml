name: CI
on: [push, pull_request]
# Opt the whole workflow into Node 24 for all JavaScript actions. This
# silences the "Node.js 20 actions are deprecated" warning emitted by
# pre-commit/action@v3.0.1 (whose pinned actions/cache@v4 still ships
# Node 20). Becomes the default on 2026-06-02; this line can be
# removed once pre-commit/action updates its cache pin to v5+.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # pre-commit runs the exact same hooks a developer gets via
      # `pre-commit install`. The hook list lives in
      # .pre-commit-config.yaml — cargo fmt --check and cargo clippy
      # -- -D warnings. Keeping CI and local in lockstep prevents the
      # fmt-drift class of failures (see session 2026-04-12-01).
      - uses: pre-commit/action@v3.0.1
      # The no-unwrap / no-expect rule is enforced by the
      # `#![cfg_attr(not(test), deny(clippy::unwrap_used))]` directive at
      # the top of src/lib.rs, so the clippy step above catches it. No
      # separate grep rule needed.
      #
      # The pounce_interface issue-#42 regression test reads the synth
      # stress fixture matrices/synth/rankdef_10_3.mtx. That tree is
      # git-ignored (matrices/ holds only generated corpora), so the
      # fixture must be generated here before `cargo test` — mirrors the
      # `synth matrices` step in the stress-smoke job. synth.py needs
      # numpy; the rest of the harness uses only stdlib.
      - name: synth stress fixtures
        run: |
          python3 -m pip install --upgrade pip "numpy>=1.23"
          python3 external_benchmarks/stress/synth.py
      - name: test
        run: cargo test
      - name: amd-cleanroom
        # feral-amd is a clean-room implementation of AMD. The external
        # `amd` crate (SuiteSparse port) must never enter the feral
        # workspace dependency graph — it lives ONLY inside the oracle
        # harness under crates/feral-amd/tests/data/amd_oracle/harness/
        # as *.txt files (so Cargo never compiles it).
        run: scripts/check-amd-cleanroom.sh
      - name: commit-body
        # Reject bare summary-only commits on PRs (advisory — does not block CI)
        run: |
          git log --format="%B" -1 | awk 'NR==2{found=1} END{if(!found){print "WARNING: commit has no body";}}'

  stress-smoke:
    # M5 gate (issue #28). Runs the stress harness in synth + small-
    # SuiteSparse mode (n <= 1000) and fails the build if report.py
    # flags any new matrix relative to the documented allowlist.
    #
    # Sizing budget: on a local M-series mac the trio (synth.py +
    # run.py --max-n 1000 + report.py) completes in <1s after the
    # release build (8s cold). x86 GitHub runners are ~2.5x slower
    # but the cargo build dominates either way; the whole job
    # comfortably fits the 10-min acceptance budget from #28.
    #
    # At n<=1000 the matrix set is 21 rows: 17 synth (zero network),
    # 3 cuter_kkt (sourced locally from tests/data/parity/), and one
    # SuiteSparse row (none currently — the smallest GHS_indef in
    # the manifest is n=6001). The actions/cache step below is wired
    # for the day a small SuiteSparse row is added; today it is a
    # zero-byte cache.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # synth.py needs numpy; the rest of the stress harness uses
      # only stdlib. Pin loosely -- any modern numpy works.
      - name: install python deps
        run: python3 -m pip install --upgrade pip "numpy>=1.23"
      # Speed up the release build of bench_one_matrix across runs.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stress-smoke
      # Cache the downloaded SuiteSparse matrices keyed on the
      # manifest hash so a manifest edit is the only trigger for a
      # re-fetch. The cache is per-manifest-content, not per-branch.
      - name: cache stress matrices
        uses: actions/cache@v4
        with:
          path: external_benchmarks/stress/matrices
          key: stress-matrices-${{ hashFiles('external_benchmarks/stress/manifest.tsv') }}
      - name: build bench_one_matrix
        run: cargo build --release --bin bench_one_matrix
      - name: synth matrices
        run: python3 external_benchmarks/stress/synth.py
      - name: run stress (n<=1000)
        run: python3 external_benchmarks/stress/run.py --max-n 1000
      - name: report (PR-blocking gate)
        run: python3 external_benchmarks/stress/report.py
      # Issue #35 x86 measurement. The aarch64 regression is confirmed
      # locally on M-series (see
      # dev/research/fma-kernel-aarch64-regression-2026-05-16.md); this
      # runs the same kernel-direct A/B on the x86_64 ubuntu runner so
      # the gate-vs-remove decision can be made from data. Informational
      # only -- does NOT fail CI on regression (this is a measurement,
      # not an invariant). Reuses the Swatinem/rust-cache layer so the
      # extra build is ~5 s warm.
      - name: probe FMA kernel (x86 measurement, #35)
        run: |
          cargo run --release --bin probe_fma_kernel
        continue-on-error: true
